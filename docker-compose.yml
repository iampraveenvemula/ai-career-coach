version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aicoach_db
    environment:
      POSTGRES_USER: aicoach
      POSTGRES_PASSWORD: aicoachpassword
      POSTGRES_DB: aicoachdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: aicoach_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
